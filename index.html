<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국내상표 업무툴</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:#fff;color:#1c1b18}
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&display=swap');
.top-bar{display:flex;align-items:center;gap:1.5rem;padding:.85rem 1.5rem;border-bottom:1px solid #e2dfd7;background:#fff;flex-shrink:0}
.logo{font-size:15px;font-weight:500;white-space:nowrap;color:#1c1b18}
.divider{width:1px;height:16px;background:#d0cdc4;flex-shrink:0}
.tab-row{display:flex;gap:4px}
.tab{font-size:13px;color:#9b9488;cursor:pointer;padding:6px 14px;background:none;border:none;font-family:'Noto Sans KR',sans-serif;border-radius:6px;transition:background .15s,color .15s}
.tab:hover{color:#1c1b18;background:#f4f3ef}
.tab.active{color:#1c1b18;font-weight:500;background:#f4f3ef}
.iframe-area{flex:1;position:relative}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
</style>
</head>
<body>
<div class="top-bar">
  <div class="logo">국내상표 업무툴</div>
  <div class="divider"></div>
  <div class="tab-row">
    <button class="tab active" onclick="go(this,'https://zungnow.github.io/trademark_goods/')">지정상품 스크리닝</button>
    <button class="tab" onclick="go(this,'https://zungnow.github.io/pdf_footprint/')">PDF 자료번호 추가</button>
  </div>
</div>
<div class="iframe-area">
  <iframe id="frame" src="https://zungnow.github.io/trademark_goods/"></iframe>
</div>

<script>
function go(btn, url){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('frame').src=url;
}
</script>
<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if(e.key === 'F12') e.preventDefault();
  if(e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) e.preventDefault();
  if(e.ctrlKey && e.key === 'u') e.preventDefault();
  if(e.ctrlKey && e.key === 's') e.preventDefault();
});
</script>
</body>
</html>
